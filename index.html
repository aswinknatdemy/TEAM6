<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM 6</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-trophy trophy-icon"></i> Referral Competition</h1>
                <p>Live tracking of student registrations across our top 8 team members</p>
            </div>
            <div class="search-container">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by Employee ID or Name...">
                </div>
            </div>
        </header>

        <main>
            <div class="stats-overview">
                <div class="stat-card verified-stat">
                    <div class="stat-icon"><i class="fa-solid fa-user-check"></i></div>
                    <div class="stat-details">
                        <h3>Total Verified</h3>
                        <p id="globalVerified">0</p>
                    </div>
                </div>
                <div class="stat-card total-stat">
                    <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                    <div class="stat-details">
                        <h3>Total Registrations</h3>
                        <p id="globalTotal">0</p>
                    </div>
                </div>
                <div class="stat-card waiting-stat">
                    <div class="stat-icon"><i class="fa-solid fa-hourglass-half"></i></div>
                    <div class="stat-details">
                        <h3>Total Waiting</h3>
                        <p id="globalWaiting">0</p>
                    </div>
                </div>
                <div class="stat-card rejected-stat">
                    <div class="stat-icon"><i class="fa-solid fa-user-xmark"></i></div>
                    <div class="stat-details">
                        <h3>Total Rejected</h3>
                        <p id="globalRejected">0</p>
                    </div>
                </div>
            </div>

            <div class="grid-container" id="membersGrid">
                <!-- Grid items will be generated by JS -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
